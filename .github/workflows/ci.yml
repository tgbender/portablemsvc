name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Sync dependencies
        run: mise run uv-sync-all

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test

      - name: Build
        run: uv build
