name: release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version not already on PyPI
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if curl -sf "https://pypi.org/pypi/portablemsvc/$VERSION/json" > /dev/null 2>&1; then
            echo "Version $VERSION already exists on PyPI, aborting."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - uses: astral-sh/setup-uv@v5

      - name: Publish
        run: uv publish --trusted-publishing always

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.build.outputs.version }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "v${{ needs.build.outputs.version }}" \
            --generate-notes
